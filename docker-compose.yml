x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    # Project-specific env vars (set in .env file)
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
    GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
    GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-podcast-pipeline-raw}
    BQ_DATASET: ${BQ_DATASET:-podcast_pipeline}
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/config/gcp-key.json
    PGVECTOR_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./models:/opt/airflow/models
    - ./logs:/opt/airflow/logs
    - ./config:/opt/airflow/config
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  api:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: []
    command: ["python", "-m", "uvicorn", "src.serving.api:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    environment:
      <<: *airflow-common-env
    volumes:
      - ./src:/opt/airflow/src
      - ./config:/opt/airflow/config
    depends_on:
      postgres:
        condition: service_healthy

  chat-ui:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: []
    command: ["python", "-m", "streamlit", "run", "src/serving/chat_ui.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      <<: *airflow-common-env
      API_URL: http://api:8000
    volumes:
      - ./src:/opt/airflow/src
      - ./config:/opt/airflow/config
    depends_on:
      - api

volumes:
  postgres-data:
